[project]
name = "amuse-nbody7"
# Version is resolved by versioningit (see [tool.versioningit.*] below)
# from the surrounding AMUSE checkout, matching what the variant wheels
# (amuse-nbody7-{sse,avx,gpu}) already do. This keeps `pip show
# amuse-nbody7` and the variants on the same version string
# (e.g. 2026.3.0) instead of the base sitting on a stale static 0.0.1.
dynamic = ["version"]
requires-python = ">=3.7"
dependencies = [
    "amuse-framework>=26.3.0"
]

[build-system]
requires = ["hatchling", "versioningit"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "versioningit"

[tool.versioningit.next-version]
method = "smallest"

[tool.versioningit.format]
distance = "{next_version}.dev{distance}+{vcs}{rev}"
dirty = "{base_version}+d{build_date:%Y%m%d}"
distance-dirty = "{next_version}.dev{distance}+{vcs}{rev}.d{build_date:%Y%m%d}"

[tool.versioningit.vcs]
method = { module = "version_helper", value = "get_amuse_version", module-dir = "amuse_nbody7/support/shared" }

[tool.hatch.build]
skip-excluded-dirs = true

[tool.hatch.build.targets.wheel]
include = [
    "amuse_nbody7/**/*.py",
    "amuse/community/nbody7/**/*.py",
    ]
exclude = [
    "amuse_nbody7/packages",
    "amuse_nbody7/support",
    "amuse_nbody7/src",
    "amuse_nbody7/tests"
    ]
artifacts = ["amuse_nbody7/nbody7_worker"]

[tool.pytest.ini_options]
pythonpath = ["amuse_nbody7/tests/"]

testpaths = ["amuse_nbody7/tests"]

